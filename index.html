<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Jogo da Memória — Animais em LIBRAS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:   #F5C842;
      --yellow-dark: #b8920a;
      --blue:     #4A90D9;
      --blue-dark: #2563a8;
      --green:    #3DBF6E;
      --green-dark: #1e7a42;
      --purple:   #7C6EF5;
      --bg:       #F0F4FF;
      --card-back:#5B6EF5;
      --card-back2:#4455e0;
      --white:    #ffffff;
      --text:     #1a1a2e;
      --text-muted: #6b7280;
      --radius-card: 16px;
      --radius-sm: 8px;
      --shadow-card: 0 4px 18px rgba(0,0,0,0.10);
      --shadow-hover: 0 8px 28px rgba(0,0,0,0.16);
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      background-image:
        radial-gradient(circle at 15% 15%, rgba(124,110,245,0.13) 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(61,191,110,0.12) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(245,200,66,0.08) 0%, transparent 60%);
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 14px 20px 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(20px, 5vw, 28px);
      color: var(--card-back);
      letter-spacing: 0.3px;
      line-height: 1;
    }

    .header-sub {
      font-size: clamp(11px, 2.5vw, 13px);
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── Stats ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px 0;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--white);
      border-radius: 50px;
      padding: 6px 16px;
      font-size: clamp(12px, 2.8vw, 14px);
      font-weight: 700;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-chip .label {
      font-weight: 600;
      color: var(--text-muted);
      font-size: 0.85em;
    }

    .stat-chip .val {
      color: var(--card-back);
      font-weight: 900;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 10px 16px 0;
      font-size: clamp(11px, 2.5vw, 13px);
      color: var(--text-muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    /* ── Grid ── */
    .grid-wrap {
      padding: 12px 12px 20px;
      display: flex;
      justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(8px, 2vw, 12px);
      width: 100%;
      max-width: 560px;
    }

    /* ── Card ── */
    .card-outer {
      aspect-ratio: 1;
      perspective: 700px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius-card);
    }

    .card-outer:not(.matched):not(.locked):hover .card-inner {
      filter: brightness(1.04);
      transform: translateY(-2px);
    }

    .card-inner.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    /* Back face */
    .card-back {
      background: var(--card-back);
      gap: 4px;
    }

    .back-icon { font-size: clamp(22px, 6vw, 34px); }

    .back-label {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(9px, 2vw, 12px);
      color: rgba(255,255,255,0.8);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Decorative circles on back */
    .card-back::before,
    .card-back::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    .card-back::before { width: 80%; padding-bottom: 80%; top: -25%; left: -20%; }
    .card-back::after  { width: 60%; padding-bottom: 60%; bottom: -20%; right: -15%; }

    /* Front face */
    .card-front {
      transform: rotateY(180deg);
      padding: clamp(4px, 1.5vw, 8px);
      gap: clamp(2px, 1vw, 5px);
    }

    .card-front.animal-card {
      background: #FFFBEA;
      border: 2.5px solid var(--yellow);
    }

    .card-front.sign-card {
      background: #EEF6FF;
      border: 2.5px solid var(--blue);
    }

    .card-tag {
      font-size: clamp(7px, 1.8vw, 10px);
      font-weight: 800;
      border-radius: 6px;
      padding: 1px 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag-animal { background: var(--yellow); color: #7a5000; }
    .tag-libras { background: var(--blue); color: #fff; }

    .card-emoji {
      font-size: clamp(20px, 6vw, 36px);
      line-height: 1;
    }

    .card-name {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(10px, 2.5vw, 15px);
      color: var(--text);
      text-align: center;
      line-height: 1.1;
    }

    .card-sign {
      font-size: clamp(7.5px, 1.8vw, 10.5px);
      color: #2a4a70;
      text-align: center;
      line-height: 1.3;
      font-weight: 700;
      padding: 0 2px;
    }

    /* Matched state */
    .card-outer.matched .card-front {
      border-color: var(--green) !important;
      background: #E8FBF0 !important;
    }

    .card-outer.matched .card-name,
    .card-outer.matched .card-sign { color: #1a5c30; }

    .card-outer.matched .card-inner {
      animation: pop 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .card-outer.shake .card-inner {
      animation: shake 0.42s ease;
    }

    @keyframes pop {
      0%   { transform: rotateY(180deg) scale(1); }
      55%  { transform: rotateY(180deg) scale(1.13); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      22%     { transform: rotateY(180deg) translateX(-7px); }
      66%     { transform: rotateY(180deg) translateX(7px); }
    }

    /* ── Restart button ── */
    .btn-wrap {
      display: flex;
      justify-content: center;
      padding: 4px 16px 24px;
    }

    .btn-restart {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(15px, 4vw, 18px);
      background: var(--card-back);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: clamp(10px, 3vw, 14px) clamp(28px, 8vw, 44px);
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 16px rgba(91,110,245,0.4);
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      touch-action: manipulation;
    }

    .btn-restart:hover  { background: var(--card-back2); box-shadow: 0 6px 22px rgba(91,110,245,0.5); }
    .btn-restart:active { transform: scale(0.96); }

    /* ── Win overlay ── */
    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(16, 20, 60, 0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(3px);
    }

    .win-overlay.visible { display: flex; animation: fadein 0.4s ease; }

    @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

    .win-card {
      background: var(--white);
      border-radius: 28px;
      padding: 36px 32px 28px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      max-width: 340px;
      width: 100%;
      animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-trophy { font-size: 56px; margin-bottom: 8px; display: block; }

    .win-title {
      font-family: 'Fredoka One', cursive;
      font-size: 28px;
      color: var(--card-back);
      margin-bottom: 8px;
    }

    .win-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 16px 0 24px;
    }

    .win-stat {
      background: var(--bg);
      border-radius: 14px;
      padding: 10px 16px;
      font-size: 13px;
    }

    .win-stat b {
      display: block;
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: var(--card-back);
    }

    .win-stat span { color: var(--text-muted); font-weight: 600; }

    .win-msg {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn-play-again {
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 40px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(61,191,110,0.4);
      transition: background 0.18s, transform 0.12s;
      touch-action: manipulation;
    }

    .btn-play-again:hover  { background: #2fa05a; }
    .btn-play-again:active { transform: scale(0.96); }

    /* ── Tablet adjustments ── */
    @media (min-width: 500px) {
      .grid { max-width: 520px; }
      .grid-wrap { padding: 14px 20px 24px; }
    }

    @media (min-width: 768px) {
      .grid { max-width: 580px; gap: 14px; }
      .header { padding: 18px 24px 14px; }
      .stats-bar { gap: 14px; padding: 16px 20px 0; }
      .legend { padding: 12px 20px 0; font-size: 13px; }
    }

    /* ── Very small phones ── */
    @media (max-width: 360px) {
      .grid { gap: 6px; }
      .stat-chip { padding: 5px 12px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-title">🤟 Jogo da Memória — LIBRAS</div>
    <div class="header-sub">Combine o animal com seu sinal em LIBRAS!</div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip">
      <span class="label">Tentativas</span>
      <span class="val" id="moves">0</span>
    </div>
    <div class="stat-chip">
      <span class="label">Pares</span>
      <span class="val"><span id="pairs">0</span>/8</span>
    </div>
    <div class="stat-chip">
      <span class="label">Tempo</span>
      <span class="val" id="timer">0:00</span>
    </div>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#F5C842;"></div>
      Animal
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4A90D9;"></div>
      Sinal LIBRAS
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Restart -->
  <div class="btn-wrap">
    <button class="btn-restart" onclick="startGame()">🔀 Novo Jogo</button>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-card">
      <span class="win-trophy">🏆</span>
      <div class="win-title">Parabéns! Você venceu!</div>
      <div class="win-stats">
        <div class="win-stat">
          <b id="win-moves">0</b>
          <span>Tentativas</span>
        </div>
        <div class="win-stat">
          <b id="win-time">0:00</b>
          <span>Tempo</span>
        </div>
      </div>
      <div class="win-msg">Incrível! Você aprendeu os sinais de 8 animais em LIBRAS. Continue praticando! 🌟</div>
      <button class="btn-play-again" onclick="closeWin()">Jogar Novamente</button>
    </div>
  </div>

  <script>
    const ANIMALS = [
      { id:1, emoji:"🐘", name:"Elefante",   sign:"🤙 Braço estendido imitando a tromba" },
      { id:2, emoji:"🦁", name:"Leão",        sign:"🖐 Mãos abertas ao redor do rosto" },
      { id:3, emoji:"🐸", name:"Sapo",        sign:"🤜 Dois dedos dobrados, saltando" },
      { id:4, emoji:"🦋", name:"Borboleta",   sign:"🤝 Polegares cruzados, dedos agitando" },
      { id:5, emoji:"🐟", name:"Peixe",       sign:"🖐 Mão plana com movimento ondulante" },
      { id:6, emoji:"🐦", name:"Pássaro",     sign:"🤌 Polegar e indicador: bico abrindo" },
      { id:7, emoji:"🐕", name:"Cachorro",    sign:"👋 Estalar dedos, tapinha na coxa" },
      { id:8, emoji:"🐱", name:"Gato",        sign:"✌ Indicadores nas bochechas: bigodes" },
    ];

    let cards = [], flipped = [], matched = [], moves = 0;
    let timerInt = null, seconds = 0, lock = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }
    function fmtTime(s) { return Math.floor(s / 60) + ':' + pad(s % 60); }

    function startGame() {
      clearInterval(timerInt);
      flipped = []; matched = []; moves = 0; lock = false; seconds = 0;
      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent  = '0';
      document.getElementById('timer').textContent  = '0:00';
      document.getElementById('win-overlay').classList.remove('visible');

      const deck = shuffle([
        ...ANIMALS.map(a => ({ ...a, type: 'animal', uid: a.id + '-a' })),
        ...ANIMALS.map(a => ({ ...a, type: 'sign',   uid: a.id + '-s' })),
      ]);
      cards = deck;

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      deck.forEach((card, idx) => {
        const outer = document.createElement('div');
        outer.className = 'card-outer';
        outer.dataset.idx = idx;

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        /* Back */
        const back = document.createElement('div');
        back.className = 'card-face card-back';
        back.innerHTML = `<span class="back-icon">🤟</span><span class="back-label">LIBRAS</span>`;

        /* Front */
        const front = document.createElement('div');
        const isAnimal = card.type === 'animal';
        front.className = 'card-face card-front ' + (isAnimal ? 'animal-card' : 'sign-card');

        if (isAnimal) {
          front.innerHTML = `
            <span class="card-tag tag-animal">Animal</span>
            <span class="card-emoji">${card.emoji}</span>
            <span class="card-name">${card.name}</span>
          `;
        } else {
          front.innerHTML = `
            <span class="card-tag tag-libras">LIBRAS</span>
            <span class="card-emoji" style="font-size:clamp(16px,4.5vw,26px)">${card.emoji}</span>
            <span class="card-sign">${card.sign}</span>
          `;
        }

        inner.appendChild(back);
        inner.appendChild(front);
        outer.appendChild(inner);
        outer.addEventListener('click', () => flipCard(idx));
        grid.appendChild(outer);
      });

      timerInt = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = fmtTime(seconds);
      }, 1000);
    }

    function getOuters() { return document.querySelectorAll('.card-outer'); }

    function flipCard(idx) {
      if (lock) return;
      const outers = getOuters();
      const outer  = outers[idx];
      const inner  = outer.querySelector('.card-inner');
      if (outer.classList.contains('matched') || flipped.includes(idx)) return;
      if (flipped.length === 2) return;

      inner.classList.add('flipped');

      if (flipped.length === 0) {
        flipped = [idx];
        return;
      }

      flipped.push(idx);
      moves++;
      document.getElementById('moves').textContent = moves;

      const c1 = cards[flipped[0]], c2 = cards[idx];
      const isMatch = c1.id === c2.id && c1.type !== c2.type;

      if (isMatch) {
        matched.push(c1.id);
        document.getElementById('pairs').textContent = matched.length;
        setTimeout(() => {
          outers[flipped[0]].classList.add('matched');
          outers[idx].classList.add('matched');
          flipped = [];
          if (matched.length === 8) showWin();
        }, 500);
      } else {
        lock = true;
        setTimeout(() => {
          outers[flipped[0]].classList.add('shake');
          outers[idx].classList.add('shake');
          setTimeout(() => {
            outers[flipped[0]].querySelector('.card-inner').classList.remove('flipped');
            outers[idx].querySelector('.card-inner').classList.remove('flipped');
            outers[flipped[0]].classList.remove('shake');
            outers[idx].classList.remove('shake');
            flipped = [];
            lock = false;
          }, 430);
        }, 700);
      }
    }

    function showWin() {
      clearInterval(timerInt);
      document.getElementById('win-moves').textContent = moves;
      document.getElementById('win-time').textContent  = fmtTime(seconds);
      setTimeout(() => {
        document.getElementById('win-overlay').classList.add('visible');
      }, 400);
    }

    function closeWin() {
      document.getElementById('win-overlay').classList.remove('visible');
      startGame();
    }

    startGame();
  </script>
</body>
</html>
